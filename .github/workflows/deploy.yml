name: Deploy to AWS Free Tier

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          
      - name: Run Django Tests
        env:
          SECRET_KEY: django-insecure-test-key-123
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          cd backend
          python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DB_NAME: ${{ secrets.RDS_DB_NAME }}
          DB_USER: ${{ secrets.RDS_DB_USER }}
          DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
          DB_HOST: ${{ secrets.RDS_DB_HOST }}
          DOMAIN: ${{ secrets.DOMAIN_NIP_IO }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DJANGO_SECRET_KEY,DB_NAME,DB_USER,DB_PASSWORD,DB_HOST,DOMAIN
          script: |
            # If the repository hasn't been cloned yet, clone it first
            if [ ! -d "$HOME/Fleet-Management-System-Fullstack" ]; then
              git clone https://github.com/${{ github.repository }}.git $HOME/Fleet-Management-System-Fullstack
            fi

            cd $HOME/Fleet-Management-System-Fullstack
            
            # Pull the latest code (in case it was already cloned)
            git pull origin main
            
            ## Create a .env file for production secrets if it doesn't exist
            #cat <<EOF > .env.prod
            #SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            #DB_NAME=${{ secrets.RDS_DB_NAME }}
            #DB_USER=${{ secrets.RDS_DB_USER }}
            #DB_PASSWORD=${{ secrets.RDS_DB_PASSWORD }}
            #DB_HOST=${{ secrets.RDS_DB_HOST }}
            #DOMAIN=${{ secrets.DOMAIN_NIP_IO }}
            #EOF
            echo "SECRET_KEY='$SECRET_KEY'" > .env.prod
            echo "DB_NAME='$DB_NAME'" >> .env.prod
            echo "DB_USER='$DB_USER'" >> .env.prod
            echo "DB_PASSWORD='$DB_PASSWORD'" >> .env.prod
            echo "DB_HOST='$DB_HOST'" >> .env.prod
            echo "DB_PORT='5432'" >> .env.prod
            echo "DEBUG='False'" >> .env.prod
            echo "DOMAIN='$DOMAIN'" >> .env.prod

            # Build and restart containers using the prod compose file
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod build
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod down
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            
            # Run database migrations
            sudo docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate
            
            # Optional: Seed the database (only if needed/first time)
            # docker compose -f docker-compose.prod.yml exec -T backend python manage.py seed_db
