version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fleet_flow_db
    environment:
      POSTGRES_DB: ${DB_NAME:-fleet_flow_db}
      POSTGRES_USER: ${DB_USER:-fleet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fleet_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
