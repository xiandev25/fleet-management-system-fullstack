name: Django REST API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: fleet_flow_db
          POSTGRES_USER: fleet_user
          POSTGRES_PASSWORD: fleet_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django System Checks
      env:
        DB_NAME: fleet_flow_db
        DB_USER: fleet_user
        DB_PASSWORD: fleet_pass
        DB_HOST: localhost
        DB_PORT: 5432
        SECRET_KEY: django-insecure-ci-secret-key-12345
        DEBUG: True
      run: |
        python manage.py check

    - name: Run Backend Tests
      env:
        DB_NAME: fleet_flow_db
        DB_USER: fleet_user
        DB_PASSWORD: fleet_pass
        DB_HOST: localhost
        DB_PORT: 5432
        SECRET_KEY: django-insecure-ci-secret-key-12345
        DEBUG: True
      run: |
        python manage.py test
