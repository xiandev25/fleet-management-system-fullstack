services:
  # Backend Service (Django API) running via Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet_flow_backend_prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - ALLOWED_HOSTS=${DOMAIN},backend
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN}
      - CSRF_TRUSTED_ORIGINS=https://${DOMAIN}
      - CORS_ALLOW_ALL_ORIGINS=False
    networks:
      - fleet_network

  # Frontend & Reverse Proxy (Caddy)
  caddy:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet_flow_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - backend
    networks:
      - fleet_network

networks:
  fleet_network:
    driver: bridge
